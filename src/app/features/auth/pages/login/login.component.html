<div class="login-container">
  <div class="login-content">
    <div class="login-header">
      <img src="tns-logo.svg?v=2" alt="TNS Agents" class="login-logo" />
      <p>Inicia sesión con tu cuenta de GitHub</p>
    </div>

    <button class="github-button" (click)="loginWithGitHub()">
      <mat-icon>code</mat-icon>
      Continuar con GitHub
    </button>

    <p class="login-hint">Solo cuentas del equipo Tech and Solve</p>
  </div>
</div>
